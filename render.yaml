# Render Blueprint - deploy all services at once
# https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: medical-researcher-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medical-db
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false  # Set manually in dashboard
      - key: LLM_PROVIDER
        value: google
      - key: CORS_ORIGINS
        fromService:
          name: medical-researcher-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    healthCheckPath: /docs

  # Frontend
  - type: web
    name: medical-researcher-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: medical-researcher-api
          type: web
          property: host

databases:
  - name: medical-db
    plan: free
    databaseName: medical_db
    postgresMajorVersion: 16
    # Note: Enable pgvector extension manually in Render dashboard
