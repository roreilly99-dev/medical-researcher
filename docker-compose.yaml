services:
  backend:
    build:
      context: ./backend # Specifies the directory containing the Dockerfile
    ports:
      - "80:80" # Maps port 8000 on your host to port 80 in the container
    volumes:
      - ./backend:/app # Mounts your local code to the container for live reloads
    depends_on:
      - db # Ensures the database starts before the backend

  db:
    image: "postgres:15-alpine" # Uses the official PostgreSQL image
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persists the database data

volumes:
  postgres_data:
